name = "fia-mcp"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
account_id = "5a3ffd86280d3ed086be76d955829242"

[vars]
FIA_API_URL = "https://api.fiaproject.org/graphql"
FIA_AUTH_URL = "https://auth.fiaproject.org/token"
ENVIRONMENT = "production"

# Secrets set via: wrangler secret put <NAME> [--env staging|dev]
# - FIA_ACCESS_KEY: FIA API access key
# - MCP_SHARED_SECRET: Shared secret for authenticating MCP clients

[env.staging]
name = "fia-mcp-staging"
[env.staging.vars]
FIA_API_URL = "https://api.fiaproject.org/graphql"
FIA_AUTH_URL = "https://auth.fiaproject.org/token"
ENVIRONMENT = "staging"

[env.dev]
name = "fia-mcp-dev"
[env.dev.vars]
FIA_API_URL = "https://api.fiaproject.org/graphql"
FIA_AUTH_URL = "https://auth.fiaproject.org/token"
ENVIRONMENT = "development"
